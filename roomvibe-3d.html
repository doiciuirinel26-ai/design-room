<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RoomVibe 3D</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#1a1a2e; font-family:'Segoe UI',sans-serif; }
canvas { display:block; cursor:grab; }
canvas:active { cursor:grabbing; }
#ui { position:fixed; top:14px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.6); color:#fff; padding:6px 18px; border-radius:20px; font-size:12px; pointer-events:none; }
#exit { position:fixed; top:14px; right:14px; background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.3); padding:8px 16px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:700; }
#xhair { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
#xhair::before { content:''; position:absolute; width:18px; height:2px; background:rgba(255,255,255,0.8); top:-1px; left:-9px; }
#xhair::after { content:''; position:absolute; width:2px; height:18px; background:rgba(255,255,255,0.8); top:-9px; left:-1px; }
#wasd { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.5); color:#ccc; padding:6px 16px; border-radius:10px; font-size:11px; pointer-events:none; }
#debug { position:fixed; bottom:60px; left:10px; background:rgba(0,0,0,0.7); color:#0f0; font-size:10px; padding:8px; border-radius:6px; max-width:300px; word-break:break-all; }
</style>
</head>
<body>
<div id="ui">🖱 Click + drag to look · WASD to move</div>
<div id="xhair"></div>
<button id="exit" onclick="window.close()">✕ Close</button>
<div id="wasd">W A S D — move | Mouse drag — look</div>
<div id="debug">Loading...</div>
<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
// ── GET DATA FROM URL ──
function getData() {
  try {
    const search = window.location.search;
    const raw = search.split('data=')[1];
    if (!raw) return null;
    const decoded = decodeURIComponent(raw);
    return JSON.parse(decoded);
  } catch(e) {
    document.getElementById('debug').textContent = 'Parse error: ' + e.message;
    return null;
  }
}

const data = getData();
document.getElementById('debug').textContent = data 
  ? `✅ Got ${data.items?.length || 0} items, room ${data.roomWidth}x${data.roomHeight}m` 
  : '❌ No data in URL';

if (!data) {
  document.getElementById('debug').textContent = '❌ No data - URL: ' + window.location.search.substring(0,100);
} else {
  build(data);
}

const CM = { Sofa:0x7C6A9E,Bed:0x5B8DB8,'Dining Table':0x8B6914,Chair:0xC47D3E,
  Wardrobe:0x4A7C59,Desk:0x6B8E9F,Lamp:0xF5C842,Bookshelf:0x9B6B47,'TV Stand':0x3D3D4E,'Coffee Table':0xA0785A };
const HM = { Sofa:0.85,Bed:0.55,'Dining Table':0.75,Chair:0.90,Wardrobe:1.90,
  Desk:0.75,Lamp:1.50,Bookshelf:1.80,'TV Stand':0.50,'Coffee Table':0.40 };

let mdown=false,lx=0,ly=0,yaw=0,pitch=0;
const keys={};

function build(data) {
  const rw=data.roomWidth||5, rh=data.roomHeight||4;
  const cw=data.canvasW||300, ch=data.canvasH||240;
  const WH=3;

  const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.shadowMap.enabled=true;

  const scene = new THREE.Scene();
  scene.background=new THREE.Color(0x1a1a2e);
  scene.fog=new THREE.FogExp2(0x1a1a2e,0.05);

  const camera = new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.05,60);
  camera.position.set(rw/2,1.6,rh/2);

  scene.add(new THREE.AmbientLight(0xffffff,0.45));
  const dl=new THREE.DirectionalLight(0xfff8e7,0.9);
  dl.position.set(rw/2,WH-0.1,rh/2); dl.castShadow=true; scene.add(dl);
  const pl=new THREE.PointLight(0x6C63FF,0.7,10);
  pl.position.set(0.5,2.5,0.5); scene.add(pl);

  // floor
  const fl=new THREE.Mesh(new THREE.PlaneGeometry(rw,rh),new THREE.MeshLambertMaterial({color:0xC8B99A}));
  fl.rotation.x=-Math.PI/2; fl.position.set(rw/2,0,rh/2); fl.receiveShadow=true; scene.add(fl);
  const grid=new THREE.GridHelper(Math.max(rw,rh)*3,Math.max(rw,rh)*6,0x777777,0x444444);
  grid.position.set(rw/2,0.001,rh/2); grid.material.opacity=0.25; grid.material.transparent=true; scene.add(grid);

  // ceiling
  const ceil=new THREE.Mesh(new THREE.PlaneGeometry(rw,rh),new THREE.MeshLambertMaterial({color:0xF5F5F0}));
  ceil.rotation.x=Math.PI/2; ceil.position.set(rw/2,WH,rh/2); scene.add(ceil);

  // walls
  function wall(w,h,pos,ry) {
    const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),new THREE.MeshLambertMaterial({color:0xEDE8E0,side:THREE.FrontSide}));
    m.position.copy(pos); m.rotation.y=ry; scene.add(m);
  }
  wall(rw,WH,new THREE.Vector3(rw/2,WH/2,0),0);
  wall(rw,WH,new THREE.Vector3(rw/2,WH/2,rh),Math.PI);
  wall(rh,WH,new THREE.Vector3(0,WH/2,rh/2),Math.PI/2);
  wall(rh,WH,new THREE.Vector3(rw,WH/2,rh/2),-Math.PI/2);

  // baseboards
  function base(w,pos,ry) {
    const m=new THREE.Mesh(new THREE.PlaneGeometry(w,0.1),new THREE.MeshLambertMaterial({color:0x6C63FF}));
    m.position.copy(pos); m.rotation.y=ry; scene.add(m);
  }
  base(rw,new THREE.Vector3(rw/2,0.05,0.005),0);
  base(rw,new THREE.Vector3(rw/2,0.05,rh-0.005),Math.PI);
  base(rh,new THREE.Vector3(0.005,0.05,rh/2),Math.PI/2);
  base(rh,new THREE.Vector3(rw-0.005,0.05,rh/2),-Math.PI/2);

  // furniture
  const loader = new THREE.GLTFLoader();
  const items = data.items || [];
  
  document.getElementById('debug').textContent = `✅ Rendering ${items.length} items`;

  items.forEach((it,i) => {
    const fh = HM[it.type]||0.8;
    const fw = (it.w/cw)*rw;
    const fd = (it.h/ch)*rh;
    const wx = (it.x/cw)*rw + fw/2;
    const wz = (it.y/ch)*rh + fd/2;
    const wy = it.z||0;

    if (it.glb) {
      loader.load(it.glb, gltf => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const scale = fh / Math.max(size.x,size.y,size.z);
        model.scale.set(scale,scale,scale);
        model.position.set(wx,wy,wz);
        model.rotation.y=-(it.r*Math.PI)/180;
        model.traverse(c=>{ if(c.isMesh){c.castShadow=true;c.receiveShadow=true;} });
        scene.add(model);
        document.getElementById('debug').textContent = `✅ Loaded GLB ${i+1}/${items.length}`;
      }, undefined, err => {
        // fallback box
        addBox(wx,wy,wz,fw,fh,fd,it);
      });
    } else {
      addBox(wx,wy,wz,fw,fh,fd,it);
    }
  });

  function addBox(wx,wy,wz,fw,fh,fd,it) {
    const g=new THREE.Group();
    const body=new THREE.Mesh(new THREE.BoxGeometry(fw,fh,fd),
      new THREE.MeshLambertMaterial({color:CM[it.type]||0x888888}));
    body.position.y=fh/2; body.castShadow=true; g.add(body);
    g.position.set(wx,wy,wz);
    g.rotation.y=-(it.r*Math.PI)/180;
    scene.add(g);
  }

  // controls
  document.getElementById('c').addEventListener('mousedown',e=>{mdown=true;lx=e.clientX;ly=e.clientY;});
  document.addEventListener('mouseup',()=>mdown=false);
  document.addEventListener('mousemove',e=>{
    if(!mdown)return;
    yaw-=(e.clientX-lx)*0.003; pitch-=(e.clientY-ly)*0.003;
    pitch=Math.max(-Math.PI/2.2,Math.min(Math.PI/2.2,pitch));
    lx=e.clientX; ly=e.clientY;
  });
  document.addEventListener('keydown',e=>keys[e.code]=true);
  document.addEventListener('keyup',e=>keys[e.code]=false);
  document.addEventListener('wheel',e=>{
    camera.fov=Math.max(30,Math.min(100,camera.fov+e.deltaY*0.04));
    camera.updateProjectionMatrix();
  });
  window.addEventListener('resize',()=>{
    renderer.setSize(innerWidth,innerHeight);
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
  });

  function loop() {
    requestAnimationFrame(loop);
    const spd=0.05;
    const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
    const rt=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
    if(keys.KeyW||keys.ArrowUp) camera.position.addScaledVector(fwd,spd);
    if(keys.KeyS||keys.ArrowDown) camera.position.addScaledVector(fwd,-spd);
    if(keys.KeyA||keys.ArrowLeft) camera.position.addScaledVector(rt,-spd);
    if(keys.KeyD||keys.ArrowRight) camera.position.addScaledVector(rt,spd);
    camera.position.x=Math.max(0.15,Math.min(rw-0.15,camera.position.x));
    camera.position.z=Math.max(0.15,Math.min(rh-0.15,camera.position.z));
    camera.position.y=1.6;
    camera.quaternion.setFromEuler(new THREE.Euler(pitch,yaw,0,'YXZ'));
    renderer.render(scene,camera);
  }
  loop();
}
</script>
</body>
</html>
