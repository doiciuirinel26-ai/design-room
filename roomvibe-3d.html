<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoomVibe 3D Viewer</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Segoe UI',sans-serif; }
canvas { display:block; cursor:grab; }
canvas:active { cursor:grabbing; }
#ui { position:fixed; top:14px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.6); color:#fff; padding:6px 18px; border-radius:20px; font-size:12px; pointer-events:none; backdrop-filter:blur(8px); white-space:nowrap; }
#btn-exit { position:fixed; top:14px; right:14px; background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.3); padding:8px 16px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:700; backdrop-filter:blur(8px); }
#btn-exit:hover { background:rgba(255,255,255,0.3); }
#xhair { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
#xhair::before { content:''; position:absolute; width:18px; height:2px; background:rgba(255,255,255,0.8); top:-1px; left:-9px; }
#xhair::after  { content:''; position:absolute; width:2px; height:18px; background:rgba(255,255,255,0.8); top:-9px; left:-1px; }
#wasd { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.5); color:#ccc; padding:6px 16px; border-radius:10px; font-size:11px; pointer-events:none; }
#loading { position:fixed; inset:0; background:#1a1a2e; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; gap:12px; }
#loading h2 { font-size:24px; color:#6C63FF; }
#loading p { font-size:13px; color:#aaa; }
</style>
</head>
<body>

<div id="loading">
  <h2>🏠 RoomVibe 3D</h2>
  <p>Loading your room...</p>
</div>

<div id="ui" style="display:none">🖱 Click + drag to look · WASD to move</div>
<div id="xhair" style="display:none"></div>
<button id="btn-exit" style="display:none">✕ Close</button>
<div id="wasd" style="display:none">W A S D — move &nbsp;|&nbsp; Mouse drag — look</div>
<canvas id="tc"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const CM = { Sofa:0x7C6A9E, Bed:0x5B8DB8, 'Dining Table':0x8B6914, Chair:0xC47D3E,
  Wardrobe:0x4A7C59, Desk:0x6B8E9F, Lamp:0xF5C842, Bookshelf:0x9B6B47, 'TV Stand':0x3D3D4E, 'Coffee Table':0xA0785A };
const HM = { Sofa:0.85, Bed:0.55, 'Dining Table':0.75, Chair:0.90, Wardrobe:1.90,
  Desk:0.75, Lamp:1.50, Bookshelf:1.80, 'TV Stand':0.50, 'Coffee Table':0.40 };

let mdown=false, lx=0, ly=0, yaw=0, pitch=0;
const keys={};

// get data from URL param
function getRoomData() {
  try {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('data');
    if (raw) return JSON.parse(decodeURIComponent(raw));
  } catch(e) { console.log('parse error', e); }
  return { roomWidth:5, roomHeight:4, items:[], wallColor:'#EDE8E0', floorColor:'#C8B99A', floorType:'parquet' };
}

function build(data) {
  const rw = data.roomWidth  || 5;
  const rh = data.roomHeight || 4;
  const cw = data.canvasW    || 300;
  const ch = data.canvasH    || 240;
  const WH = 3;

  const tc = document.getElementById('tc');
  const rdr = new THREE.WebGLRenderer({ canvas:tc, antialias:true });
  rdr.setPixelRatio(Math.min(devicePixelRatio,2));
  rdr.setSize(innerWidth, innerHeight);
  rdr.shadowMap.enabled = true;

  const sc = new THREE.Scene();
  sc.background = new THREE.Color(0x1a1a2e);
  sc.fog = new THREE.FogExp2(0x1a1a2e, 0.05);

  const cam = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.05, 60);
  cam.position.set(rw/2, 1.6, rh/2);

  sc.add(new THREE.AmbientLight(0xffffff, 0.45));
  const dl = new THREE.DirectionalLight(0xfff8e7, 0.9);
  dl.position.set(rw/2, WH-0.1, rh/2); dl.castShadow=true; sc.add(dl);
  const pl = new THREE.PointLight(0x6C63FF, 0.7, 10);
  pl.position.set(0.5, 2.5, 0.5); sc.add(pl);

  // floor
  const floorCol = new THREE.Color(data.floorColor || '#C8B99A');
  const fl = new THREE.Mesh(new THREE.PlaneGeometry(rw,rh), new THREE.MeshLambertMaterial({color:floorCol}));
  fl.rotation.x=-Math.PI/2; fl.position.set(rw/2,0,rh/2); fl.receiveShadow=true; sc.add(fl);
  
  // floor grid pattern based on type
  const floorType = data.floorType || 'parquet';
  const gridColor = floorType === 'tile' ? 0xAAAAAA : floorType === 'marble' ? 0xCCCCCC : 0x777777;
  const gridDiv   = floorType === 'tile' ? Math.max(rw,rh)*4 : Math.max(rw,rh)*6;
  const grid = new THREE.GridHelper(Math.max(rw,rh)*3, gridDiv, gridColor, gridColor);
  grid.position.set(rw/2,0.001,rh/2); 
  grid.material.opacity = floorType === 'concrete' ? 0.05 : 0.2; 
  grid.material.transparent=true; sc.add(grid);

  // ceiling
  const ceil = new THREE.Mesh(new THREE.PlaneGeometry(rw,rh), new THREE.MeshLambertMaterial({color:0xF5F5F0}));
  ceil.rotation.x=Math.PI/2; ceil.position.set(rw/2,WH,rh/2); sc.add(ceil);
  const lf = new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.25,0.04,16),
    new THREE.MeshLambertMaterial({color:0xFFFDE7,emissive:0xFFFDE7,emissiveIntensity:0.6}));
  lf.position.set(rw/2,WH-0.03,rh/2); sc.add(lf);

  // walls
  function wall(w,h,pos,ry) {
    const wallCol = new THREE.Color(data.wallColor || '#EDE8E0');
    const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),new THREE.MeshLambertMaterial({color:wallCol,side:THREE.FrontSide}));
    m.position.copy(pos); m.rotation.y=ry; m.receiveShadow=true; sc.add(m);
  }
  wall(rw,WH,new THREE.Vector3(rw/2,WH/2,0),0);
  wall(rw,WH,new THREE.Vector3(rw/2,WH/2,rh),Math.PI);
  wall(rh,WH,new THREE.Vector3(0,WH/2,rh/2),Math.PI/2);
  wall(rh,WH,new THREE.Vector3(rw,WH/2,rh/2),-Math.PI/2);

  // baseboards
  function base(w,pos,ry) {
    const m=new THREE.Mesh(new THREE.PlaneGeometry(w,0.1),new THREE.MeshLambertMaterial({color:0x6C63FF}));
    m.position.copy(pos); m.rotation.y=ry; sc.add(m);
  }
  base(rw,new THREE.Vector3(rw/2,0.05,0.005),0);
  base(rw,new THREE.Vector3(rw/2,0.05,rh-0.005),Math.PI);
  base(rh,new THREE.Vector3(0.005,0.05,rh/2),Math.PI/2);
  base(rh,new THREE.Vector3(rw-0.005,0.05,rh/2),-Math.PI/2);

  // furniture
  (data.items||[]).forEach(it => {
    const fh = HM[it.type]||0.8;
    const fw = (it.w/cw)*rw;
    const fd = (it.h/ch)*rh;
    const g  = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(fw,fh,fd),
      new THREE.MeshLambertMaterial({color:CM[it.type]||0x888888}));
    body.position.y=fh/2; body.castShadow=true; body.receiveShadow=true; g.add(body);
    const top = new THREE.Mesh(new THREE.PlaneGeometry(fw*0.9,fd*0.9),
      new THREE.MeshLambertMaterial({color:new THREE.Color(CM[it.type]||0x888888).lerp(new THREE.Color(0xffffff),0.3)}));
    top.rotation.x=-Math.PI/2; top.position.y=fh+0.001; g.add(top);
    g.position.set((it.x/cw)*rw+fw/2, 0, (it.y/ch)*rh+fd/2);
    g.rotation.y=-(it.r*Math.PI)/180;
    sc.add(g);
  });

  // hide loading, show UI
  document.getElementById('loading').style.display='none';
  document.getElementById('ui').style.display='block';
  document.getElementById('xhair').style.display='block';
  document.getElementById('btn-exit').style.display='block';
  document.getElementById('wasd').style.display='block';

  // mouse look
  tc.addEventListener('mousedown', e=>{mdown=true;lx=e.clientX;ly=e.clientY;});
  document.addEventListener('mouseup',()=>mdown=false);
  document.addEventListener('mousemove',e=>{
    if(!mdown)return;
    yaw-=(e.clientX-lx)*0.003; pitch-=(e.clientY-ly)*0.003;
    pitch=Math.max(-Math.PI/2.2,Math.min(Math.PI/2.2,pitch));
    lx=e.clientX; ly=e.clientY;
  });
  document.addEventListener('keydown',e=>keys[e.code]=true);
  document.addEventListener('keyup',e=>keys[e.code]=false);
  document.addEventListener('wheel',e=>{
    cam.fov=Math.max(30,Math.min(100,cam.fov+e.deltaY*0.04));
    cam.updateProjectionMatrix();
  });
  window.addEventListener('resize',()=>{
    rdr.setSize(innerWidth,innerHeight);
    cam.aspect=innerWidth/innerHeight;
    cam.updateProjectionMatrix();
  });

  document.getElementById('btn-exit').addEventListener('click',()=>window.close());

  function loop() {
    requestAnimationFrame(loop);
    const spd=0.05;
    const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
    const rt=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
    if(keys.KeyW||keys.ArrowUp)    cam.position.addScaledVector(fwd,spd);
    if(keys.KeyS||keys.ArrowDown)  cam.position.addScaledVector(fwd,-spd);
    if(keys.KeyA||keys.ArrowLeft)  cam.position.addScaledVector(rt,-spd);
    if(keys.KeyD||keys.ArrowRight) cam.position.addScaledVector(rt,spd);
    cam.position.x=Math.max(0.15,Math.min(rw-0.15,cam.position.x));
    cam.position.z=Math.max(0.15,Math.min(rh-0.15,cam.position.z));
    cam.position.y=1.6;
    cam.quaternion.setFromEuler(new THREE.Euler(pitch,yaw,0,'YXZ'));
    rdr.render(sc,cam);
  }
  loop();
}

window.addEventListener('load', () => {
  const data = getRoomData();
  build(data);
});
</script>
</body>
</html>
